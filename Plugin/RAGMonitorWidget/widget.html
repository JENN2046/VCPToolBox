<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>RAG 实时监控</title> <style> body { margin: 0; padding: 15px; background: rgba(15, 32, 39, 0.85); color: #00ff9d; font-family: 'Consolas', 'Monaco', monospace; overflow: hidden; backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(0, 255, 157, 0.3); user-select: none; height: 100vh; box-sizing: border-box; } .container { display: flex; flex-direction: column; gap: 10px; height: 100%; } .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 255, 157, 0.3); padding-bottom: 8px; font-size: 14px; font-weight: bold; text-shadow: 0 0 5px rgba(0, 255, 157, 0.5); } .status-badge { background: rgba(0, 255, 157, 0.2); padding: 2px 8px; border-radius: 4px; font-size: 12px; border: 1px solid rgba(0, 255, 157, 0.5); } .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } .stat-card { background: rgba(0, 255, 157, 0.1); padding: 10px; border-radius: 6px; text-align: center; border: 1px solid rgba(0, 255, 157, 0.2); } .stat-value { font-size: 20px; font-weight: bold; display: block; margin-bottom: 4px; text-shadow: 0 0 8px rgba(0, 255, 157, 0.6); } .stat-label { font-size: 10px; opacity: 0.8; } .progress-container { background: rgba(255, 255, 255, 0.1); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 5px; } .progress-bar { height: 100%; background: linear-gradient(90deg, #00ff9d, #00b8ff); width: 0%; transition: width 0.3s ease; box-shadow: 0 0 10px rgba(0, 255, 157, 0.5); } .log-area { font-size: 11px; color: #aab; height: 80px; overflow-y: auto; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 5px; } .log-line { margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } .log-line.new { color: #00ff9d; font-weight: bold; animation: flash 1s; } @keyframes flash { 0% { opacity: 0; } 100% { opacity: 1; } } ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); } ::-webkit-scrollbar-thumb { background: rgba(0, 255, 157, 0.3); border-radius: 2px; } </style> </head> <body> <div class="container"> <div class="header"> <span>🧠 RAG 实时监控</span> <span class="status-badge" id="status">等待数据...</span> </div> <div class="stats-grid"> <div class="stat-card"> <span class="stat-value" id="files">0</span> <span class="stat-label">已处理文件块</span> </div> <div class="stat-card"> <span class="stat-value" id="vectors">0</span> <span class="stat-label">已加载向量</span> </div> </div> <div> <div style="font-size: 10px; color: #aaa; display:flex; justify-content:space-between;"> <span>处理进度</span> <span id="progress-text">0%</span> </div> <div class="progress-container"> <div class="progress-bar" id="progress"></div> </div> </div> <div class="log-area" id="logs"> <div class="log-line">等待 RAG 活动...</div> </div> </div> <script> // 模拟 WebSocket 连接 (实际使用时替换为 VCP-Desktop 的真实 WS 地址) const wsUrl = 'ws://localhost:6001'; const ws = new WebSocket(wsUrl); const statusEl = document.getElementById('status'); const filesEl = document.getElementById('files'); const vectorsEl = document.getElementById('vectors'); const progressEl = document.getElementById('progress'); const progressTextEl = document.getElementById('progress-text'); const logsEl = document.getElementById('logs'); ws.onopen = () => { console.log('连接到 VCP WebSocket'); addLog('✅ 已连接到监控服务'); statusEl.innerText = '在线监听'; statusEl.style.borderColor = '#00ff9d'; }; ws.onmessage = (event) => { try { const data = JSON.parse(event.data); if (data.type === 'RAG_PROGRESS_UPDATE') { updateUI(data.payload); } } catch (e) { console.error('解析错误', e); } }; ws.onclose = () => { statusEl.innerText = '断开连接'; statusEl.style.borderColor = '#ff5555'; addLog('❌ 连接断开，尝试重连...'); setTimeout(() => location.reload(), 2000); }; function updateUI(payload) { filesEl.innerText = payload.processedFiles || 0; vectorsEl.innerText = payload.totalVectors || 0; statusEl.innerText = payload.status || '未知'; const progress = (payload.processedFiles % 500) / 5; progressEl.style.width = Math.min(progress, 100) + '%'; progressTextEl.innerText = Math.min(progress, 100).toFixed(1) + '%'; if (payload.status) { addLog(`📢 ${payload.status}`); } } function addLog(msg) { const div = document.createElement('div'); div.className = 'log-line new'; div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`; logsEl.prepend(div); if (logsEl.children.length > 20) { logsEl.lastChild.remove(); } } </script> </body> </html>
