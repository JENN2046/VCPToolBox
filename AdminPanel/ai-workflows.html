<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生图工作流 - VCP ToolBox</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="woff.css">
    <link rel="icon" href="favicon.ico">
    <style>
        :root {
            --primary-color: #7c3aed;
            --primary-hover: #6d28d9;
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --card-hover: #252525;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #7c3aed, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .category-tab:hover {
            background: var(--card-hover);
            color: var(--text-primary);
        }

        .category-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 工作流卡片网格 */
        .workflow-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }

        .workflow-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .workflow-card:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .workflow-card.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
        }

        .workflow-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .workflow-id {
            font-size: 0.75rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .workflow-complexity {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .workflow-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .workflow-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .workflow-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            padding: 4px 8px;
            background: rgba(124, 58, 237, 0.2);
            color: var(--primary-color);
            border-radius: 4px;
        }

        /* 预览面板 */
        .preview-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-top: 2rem;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .prompt-textarea {
            width: 100%;
            min-height: 150px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 1rem;
        }

        .negative-prompt {
            border-color: #ef4444;
        }

        .params-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 1rem;
        }

        .param-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
        }

        .param-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .param-value {
            font-size: 1rem;
            font-weight: 600;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 1rem;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        /* 状态提示 */
        .status-bar {
            padding: 12px;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        .status-bar.show {
            display: block;
        }

        .status-bar.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .status-bar.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI 生图工作流</h1>
        <p class="subtitle">选择并配置 ComfyUI 工作流模板，生成专业级图像</p>

        <!-- 分类标签 -->
        <div class="category-tabs">
            <div class="category-tab active" data-category="all">全部</div>
            <div class="category-tab" data-category="ecommerce">服装电商</div>
            <div class="category-tab" data-category="portrait">人像写真</div>
            <div class="category-tab" data-category="marketing">营销海报</div>
            <div class="category-tab" data-category="anime">二次元</div>
        </div>

        <!-- 工作流卡片网格 -->
        <div class="workflow-grid" id="workflowGrid">
            <!-- 由 JS 动态生成 -->
        </div>

        <!-- 预览面板 -->
        <div class="preview-panel" id="previewPanel" style="display: none;">
            <div class="preview-header">
                <h2 id="previewTitle">工作流预览</h2>
                <span class="workflow-id" id="previewId"></span>
            </div>

            <div class="workflow-desc" id="previewDesc"></div>

            <h3>提示词</h3>
            <textarea class="prompt-textarea" id="promptInput" placeholder="正面提示词..."></textarea>

            <h3>负面提示词</h3>
            <textarea class="prompt-textarea negative-prompt" id="negativePromptInput" placeholder="负面提示词..."></textarea>

            <h3>参数配置</h3>
            <div class="params-grid" id="paramsGrid">
                <!-- 由 JS 动态生成 -->
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateImage()">
                    🚀 生成图像
                </button>
                <button class="btn btn-secondary" onclick="copyPrompts()">
                    📋 复制提示词
                </button>
                <button class="btn btn-secondary" onclick="resetSelection()">
                    🔄 重置
                </button>
            </div>

            <div class="status-bar" id="statusBar"></div>
        </div>
    </div>

    <script>
        // 工作流模板数据
        const workflows = [
            // 服装电商
            { id: 'WF-001', name: '电商模特图 - 基础', category: 'ecommerce', complexity: 1, desc: '标准电商服装展示，纯色背景', tags: ['女装', '男装', '纯色背景'] },
            { id: 'WF-002', name: '电商模特图 - 场景化', category: 'ecommerce', complexity: 2, desc: '场景化穿搭展示，街头/咖啡厅/办公室', tags: ['场景', '街拍', '生活方式'] },
            { id: 'WF-003', name: '同款多色批量生成', category: 'ecommerce', complexity: 2, desc: '同一款式多颜色变体批量生成', tags: ['批量', '多色', '变体'] },
            { id: 'WF-004', name: '平铺图转模特图', category: 'ecommerce', complexity: 3, desc: '平铺图转换为真人模特展示', tags: ['平铺转模特', 'ControlNet'] },

            // 人像写真
            { id: 'WF-005', name: '清新人像', category: 'portrait', complexity: 1, desc: '清新风格的人像写真', tags: ['自然', '清新', '户外'] },
            { id: 'WF-006', name: '职业形象照', category: 'portrait', complexity: 2, desc: '职业头像/工牌照', tags: ['职业', '商务', '工牌'] },
            { id: 'WF-007', name: '艺术写真', category: 'portrait', complexity: 3, desc: '艺术创作/创意人像', tags: ['艺术', '创意', '戏剧光'] },

            // 营销海报
            { id: 'WF-008', name: '电商促销海报', category: 'marketing', complexity: 1, desc: '电商活动促销海报', tags: ['促销', '活动', ' banner'] },
            { id: 'WF-009', name: '产品展示白底图', category: 'marketing', complexity: 1, desc: '产品目录/电商详情页', tags: ['产品', '白底', '目录'] },

            // 二次元
            { id: 'WF-010', name: '二次元角色设计', category: 'anime', complexity: 2, desc: '原创角色/同人创作', tags: ['动漫', '角色', '原创'] },
            { id: 'WF-011', name: '游戏原画风格', category: 'anime', complexity: 3, desc: '游戏概念图/宣传图', tags: ['游戏', '原画', '概念'] },
            { id: 'WF-012', name: 'Q 版角色生成', category: 'anime', complexity: 2, desc: '表情包/Q 版头像', tags: ['Q 版', '可爱', '表情包'] }
        ];

        // 提示词模板
        const promptTemplates = {
            'WF-001': {
                prompt: 'professional model wearing {服装}, studio lighting, clean white background, full body shot, fashion photography, commercial grade, detailed fabric texture, masterpiece, best quality, 8k, ultra-detailed',
                negative: '(worst quality, low quality, normal quality:1.7), watermark, text, signature, logo, deformed, bad anatomy',
                params: { width: 1024, height: 1536, steps: 30, cfg: 7.5, sampler: 'dpmpp_2m' }
            },
            'WF-002': {
                prompt: 'fashion model wearing {服装}, {场景}, {光影}, candid pose, lifestyle photography, masterpiece, best quality, 8k',
                negative: '(worst quality, low quality, normal quality:1.7), watermark, text, signature, logo, deformed, bad anatomy',
                params: { width: 1024, height: 1536, steps: 30, cfg: 7.5, sampler: 'dpmpp_2m' }
            },
            'WF-005': {
                prompt: 'beautiful asian woman, natural makeup, soft smile, daylight, park background, shallow depth of field, portrait photography, skin retouching, masterpiece, best quality, 8k',
                negative: '(worst quality, low quality:1.4), ugly, deformed, noisy, blurry, bad anatomy, extra limbs, poorly drawn face',
                params: { width: 1024, height: 1024, steps: 30, cfg: 7, sampler: 'dpmpp_2m' }
            },
            'WF-006': {
                prompt: 'professional headshot, business attire, studio lighting, neutral expression, clean background, corporate portrait, confident expression, sharp focus, masterpiece, best quality, 8k',
                negative: '(worst quality, low quality:1.4), ugly, deformed, noisy, bad anatomy',
                params: { width: 1024, height: 1024, steps: 35, cfg: 8, sampler: 'dpmpp_2m' }
            },
            'WF-008': {
                prompt: 'promotional banner, sale event, discount badge, clean layout, commercial design, high contrast, eye catching, professional graphic design, red and white colors, 8k',
                negative: '(worst quality, low quality:1.4), blurry, distorted, text error, spelling mistake',
                params: { width: 1024, height: 1024, steps: 30, cfg: 7, sampler: 'dpmpp_2m' }
            },
            'WF-010': {
                prompt: 'anime style, original character, detailed eyes, long hair, beautiful dress, cel shading, vibrant colors, character design, illustration, masterpiece, best quality, 8k',
                negative: '(worst quality, low quality:1.4), deformed, mutated, extra limbs',
                params: { width: 1024, height: 1024, steps: 30, cfg: 7, sampler: 'dpmpp_2m' }
            },
            'WF-012': {
                prompt: 'chibi style, cute character, simplified proportions, big eyes, kawaii, sticker art, clean lines, flat colors, masterpiece, best quality',
                negative: '(worst quality, low quality:1.4)',
                params: { width: 1024, height: 1024, steps: 25, cfg: 6, sampler: 'dpmpp_2m' }
            }
        };

        let selectedWorkflow = null;
        let currentCategory = 'all';

        // 渲染工作流卡片
        function renderWorkflows() {
            const grid = document.getElementById('workflowGrid');
            grid.innerHTML = '';

            workflows.forEach(wf => {
                if (currentCategory !== 'all' && wf.category !== currentCategory) return;

                const card = document.createElement('div');
                card.className = 'workflow-card';
                card.onclick = () => selectWorkflow(wf.id);

                card.innerHTML = `
                    <div class="workflow-header">
                        <span class="workflow-id">${wf.id}</span>
                        <span class="workflow-complexity">${'★'.repeat(wf.complexity)}${'☆'.repeat(3-wf.complexity)}</span>
                    </div>
                    <div class="workflow-name">${wf.name}</div>
                    <div class="workflow-desc">${wf.desc}</div>
                    <div class="workflow-tags">
                        ${wf.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // 选择工作流
        function selectWorkflow(id) {
            selectedWorkflow = id;
            const wf = workflows.find(w => w.id === id);
            const template = promptTemplates[id] || {};

            // 更新选中状态
            document.querySelectorAll('.workflow-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.target.closest('.workflow-card')?.classList.add('selected');

            // 显示预览面板
            document.getElementById('previewPanel').style.display = 'block';
            document.getElementById('previewTitle').textContent = wf.name;
            document.getElementById('previewId').textContent = wf.id;
            document.getElementById('previewDesc').textContent = wf.desc;

            // 填充提示词
            document.getElementById('promptInput').value = template.prompt || '';
            document.getElementById('negativePromptInput').value = template.negative || '';

            // 渲染参数
            renderParams(template.params || {});

            // 滚动到预览区
            document.getElementById('previewPanel').scrollIntoView({ behavior: 'smooth' });
        }

        // 渲染参数
        function renderParams(params) {
            const grid = document.getElementById('paramsGrid');
            grid.innerHTML = `
                <div class="param-item">
                    <div class="param-label">Width</div>
                    <div class="param-value">${params.width || 1024}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">Height</div>
                    <div class="param-value">${params.height || 1024}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">Steps</div>
                    <div class="param-value">${params.steps || 30}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">CFG</div>
                    <div class="param-value">${params.cfg || 7}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">Sampler</div>
                    <div class="param-value">${params.sampler || 'dpmpp_2m'}</div>
                </div>
            `;
        }

        // 生成图像
        async function generateImage() {
            const prompt = document.getElementById('promptInput').value;
            const negative = document.getElementById('negativePromptInput').value;

            showStatus('正在调用 ComfyUI 生成...', 'info');

            try {
                const response = await fetch('/api/comfyui/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        workflow: selectedWorkflow,
                        prompt: prompt,
                        negative_prompt: negative
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('✅ 生成成功！图像正在处理中...', 'success');
                } else {
                    showStatus('❌ 生成失败：' + (result.error || '未知错误'), 'error');
                }
            } catch (e) {
                showStatus('❌ 调用失败：' + e.message, 'error');
            }
        }

        // 复制提示词
        function copyPrompts() {
            const prompt = document.getElementById('promptInput').value;
            const negative = document.getElementById('negativePromptInput').value;
            const text = `正面提示词:\n${prompt}\n\n负面提示词:\n${negative}`;

            navigator.clipboard.writeText(text).then(() => {
                showStatus('✅ 提示词已复制到剪贴板', 'success');
            });
        }

        // 重置
        function resetSelection() {
            selectedWorkflow = null;
            document.getElementById('previewPanel').style.display = 'none';
            document.querySelectorAll('.workflow-card').forEach(card => {
                card.classList.remove('selected');
            });
        }

        // 显示状态
        function showStatus(message, type) {
            const bar = document.getElementById('statusBar');
            bar.textContent = message;
            bar.className = 'status-bar show ' + type;
        }

        // 分类切换
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                renderWorkflows();
            };
        });

        // 初始化
        renderWorkflows();
    </script>
</body>
</html>
