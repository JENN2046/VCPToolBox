// AdminPanel 图片管理面板 HTML
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片管理 - VCP</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #0f3460;
      --text-primary: #eee;
      --text-secondary: #bbb;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --success: #4caf50;
      --warning: #ff9800;
      --favorite: #ffd700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 20px;
      background: var(--bg-secondary);
      border-radius: 10px;
    }

    h1 { font-size: 24px; }

    .stats-bar {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat-card {
      flex: 1;
      min-width: 150px;
      padding: 15px 20px;
      background: var(--bg-card);
      border-radius: 8px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: bold;
      color: var(--accent);
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 5px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 15px;
      background: var(--bg-secondary);
      border-radius: 8px;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select, input[type="text"], input[type="number"] {
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid #333;
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 14px;
    }

    input[type="text"]:focus, select:focus {
      outline: 2px solid var(--accent);
    }

    button {
      padding: 8px 16px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    button:hover { background: var(--accent-hover); }
    button.secondary { background: #444; }
    button.secondary:hover { background: #555; }
    button.success { background: var(--success); }
    button.success:hover { background: #45a049; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .image-card {
      background: var(--bg-secondary);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .image-card:hover {
      transform: translateY(-3px);
    }

    .image-card .image-wrapper {
      position: relative;
      padding-top: 100%;
      background: #000;
    }

    .image-card img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .image-card .card-body {
      padding: 12px;
    }

    .image-card .image-path {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }

    .image-card .rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .image-card .score-input {
      width: 50px;
      text-align: center;
    }

    .image-card .tags-input {
      flex: 1;
      font-size: 12px;
    }

    .image-card .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .image-card .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: var(--bg-card);
      border-radius: 12px;
      font-size: 11px;
    }

    .image-card .tag button {
      padding: 0;
      width: 14px;
      height: 14px;
      font-size: 10px;
      line-height: 1;
      border-radius: 50%;
    }

    .image-card .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .image-card .actions button {
      flex: 1;
      min-width: 60px;
    }

    .favorite-btn {
      background: transparent !important;
      border: 1px solid var(--favorite);
      color: var(--favorite);
    }

    .favorite-btn.active {
      background: var(--favorite) !important;
      color: #000;
    }

    .score-display {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
    }

    .score-display.good { color: var(--success); }
    .score-display.medium { color: var(--warning); }
    .score-display.bad { color: var(--accent); }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .message {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 4px;
      color: white;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .message.success { background: var(--success); }
    .message.error { background: var(--accent); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--bg-secondary);
      border-radius: 10px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #333;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      padding: 15px 20px;
      border-top: 1px solid #333;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .comment-textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      background: var(--bg-card);
      border: 1px solid #333;
      border-radius: 4px;
      color: var(--text-primary);
      resize: vertical;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖼️ 图片管理</h1>
      <div>
        <button class="secondary" onclick="refreshData()">🔄 刷新</button>
        <button onclick="toggleViewMode()">📊 切换视图</button>
      </div>
    </header>

    <!-- 统计栏 -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card">
        <div class="value" id="statTotal">-</div>
        <div class="label">总图片数</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statRated">-</div>
        <div class="label">已评分</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statFavorites">-</div>
        <div class="label">收藏</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statAvgScore">-</div>
        <div class="label">平均分</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statTags">-</div>
        <div class="label">标签数</div>
      </div>
    </div>

    <!-- 过滤器 -->
    <div class="filters">
      <div class="filter-group">
        <label>评分:</label>
        <select id="filterMinScore">
          <option value="">全部</option>
          <option value="1">1+ 星</option>
          <option value="3">3+ 星</option>
          <option value="5">5+ 星</option>
          <option value="7">7+ 星</option>
          <option value="9">9+ 星</option>
        </select>
        <span>到</span>
        <select id="filterMaxScore">
          <option value="">全部</option>
          <option value="10">10 星</option>
          <option value="8">8 星以下</option>
          <option value="5">5 星以下</option>
          <option value="3">3 星以下</option>
        </select>
      </div>
      <div class="filter-group">
        <label>
          <input type="checkbox" id="filterFavorite"> 仅看收藏
        </label>
      </div>
      <div class="filter-group">
        <label>来源:</label>
        <select id="filterPlugin">
          <option value="">全部</option>
          <option value="ZImageGen">ZImageGen</option>
          <option value="FluxGen">FluxGen</option>
          <option value="DoubaoGen">DoubaoGen</option>
          <option value="NovelAIGen">NovelAIGen</option>
          <option value="ComfyUIGen">ComfyUIGen</option>
          <option value="GeminiImageGen">GeminiImageGen</option>
          <option value="QwenImageGen">QwenImageGen</option>
        </select>
      </div>
      <div class="filter-group">
        <label>标签:</label>
        <input type="text" id="filterTags" placeholder="输入标签，逗号分隔">
      </div>
      <button class="success" onclick="applyFilters()">应用筛选</button>
      <button class="secondary" onclick="resetFilters()">重置</button>
    </div>

    <!-- 图片列表 -->
    <div class="image-grid" id="imageGrid">
      <div class="loading">加载中...</div>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- 评价 Modal -->
  <div id="ratingModal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h3>编辑评价</h3>
        <button class="secondary" onclick="closeRatingModal()">✕</button>
      </div>
      <div class="modal-body">
        <img id="modalImage" src="" style="width: 100%; max-height: 300px; object-fit: contain; display: block; margin: 0 auto;">
        <div style="margin-top: 15px;">
          <label>评分 (1-10):</label>
          <input type="number" id="modalScore" min="1" max="10" style="width: 60px; margin-left: 10px;">
        </div>
        <div style="margin-top: 15px;">
          <label>评价:</label>
          <textarea id="modalComment" class="comment-textarea" placeholder="写下您的评价..."></textarea>
        </div>
        <div style="margin-top: 15px;">
          <label>标签:</label>
          <input type="text" id="modalTags" style="width: 100%; margin-top: 5px;" placeholder="输入标签，逗号分隔">
          <div id="modalTagsList" class="tags-list" style="margin-top: 10px;"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="secondary" onclick="closeRatingModal()">取消</button>
        <button class="success" onclick="saveRating()">保存</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api/image-rating';
    let currentPage = 1;
    const pageSize = 20;
    let currentFilters = {};
    let editingImageId = null;
    let allTags = [];

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadStats();
      loadImages();
      loadTags();
    });

    // 加载统计
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/stats`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('statTotal').textContent = data.stats.total_images;
          document.getElementById('statRated').textContent = data.stats.rated_images;
          document.getElementById('statFavorites').textContent = data.stats.favorites;
          document.getElementById('statAvgScore').textContent = (data.stats.average_score || 0).toFixed(1);
          document.getElementById('statTags').textContent = data.stats.total_tags;
        }
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    // 加载图片
    async function loadImages() {
      const grid = document.getElementById('imageGrid');
      grid.innerHTML = '<div class="loading">加载中...</div>';

      const params = new URLSearchParams({
        limit: pageSize,
        ...currentFilters
      });

      try {
        const res = await fetch(`${API_BASE}/images?${params}`);
        const data = await res.json();

        if (data.success && data.images.length > 0) {
          grid.innerHTML = data.images.map(img => createImageCard(img)).join('');
        } else {
          grid.innerHTML = '<div class="loading">暂无图片</div>';
        }
      } catch (e) {
        grid.innerHTML = '<div class="loading">加载失败</div>';
        console.error(e);
      }
    }

    // 创建图片卡片
    function createImageCard(img) {
      const scoreClass = img.score >= 7 ? 'good' : (img.score >= 5 ? 'medium' : 'bad');
      const tags = img.tags || [];

      return `
        <div class="image-card">
          <div class="image-wrapper">
            <img src="/pw=${window.IMAGESERVER_IMAGE_KEY || 'key'}/images/${img.image_path}" alt="${img.image_path}" loading="lazy">
          </div>
          <div class="card-body">
            <div class="image-path" title="${img.image_path}">${img.image_path}</div>
            <div class="rating-row">
              <span class="score-display ${scoreClass}">评分：${img.score || '-'}/10</span>
              <button class="${img.is_favorite ? 'favorite-btn active' : 'favorite-btn'}" onclick="toggleFavorite('${img.id}', ${!img.is_favorite})">
                ${img.is_favorite ? '★' : '☆'}
              </button>
            </div>
            ${img.comment ? `<div style="font-size:12px;color:#888;margin-bottom:8px;">${img.comment}</div>` : ''}
            <div class="tags-list">
              ${tags.map(t => `<span class="tag">${t} <button onclick="removeTag('${img.id}', '${t}')">×</button></span>`).join('')}
            </div>
            <div class="actions">
              <button onclick="openRatingModal('${img.id}')">编辑</button>
              <button class="secondary" onclick="viewImage('${img.image_path}')">查看</button>
              <button class="secondary" onclick="copyPath('${img.image_path}')">复制路径</button>
            </div>
          </div>
        </div>
      `;
    }

    // 应用筛选
    function applyFilters() {
      currentFilters = {
        minScore: document.getElementById('filterMinScore').value,
        maxScore: document.getElementById('filterMaxScore').value,
        favoriteOnly: document.getElementById('filterFavorite').checked,
        pluginSource: document.getElementById('filterPlugin').value,
        tags: document.getElementById('filterTags').value
      };
      loadImages();
    }

    // 重置筛选
    function resetFilters() {
      document.getElementById('filterMinScore').value = '';
      document.getElementById('filterMaxScore').value = '';
      document.getElementById('filterFavorite').checked = false;
      document.getElementById('filterPlugin').value = '';
      document.getElementById('filterTags').value = '';
      currentFilters = {};
      loadImages();
    }

    // 切换收藏
    async function toggleFavorite(imageId, isFavorite) {
      try {
        const res = await fetch(`${API_BASE}/image/${imageId}/favorite`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ isFavorite })
        });
        const data = await res.json();
        if (data.success) {
          showMessage('操作成功', 'success');
          loadImages();
          loadStats();
        }
      } catch (e) {
        showMessage('操作失败', 'error');
      }
    }

    // 打开评价 Modal
    async function openRatingModal(imageId) {
      editingImageId = imageId;
      const res = await fetch(`${API_BASE}/image/${imageId}`);
      const data = await res.json();

      if (data.success) {
        const img = data.image;
        const rating = data.rating;

        document.getElementById('modalImage').src = `/pw=${window.IMAGESERVER_IMAGE_KEY || 'key'}/images/${img.image_path}`;
        document.getElementById('modalScore').value = rating?.score || '';
        document.getElementById('modalComment').value = rating?.comment || '';
        document.getElementById('modalTags').value = data.tags?.join(', ') || '';

        document.getElementById('ratingModal').style.display = 'flex';
      }
    }

    // 关闭评价 Modal
    function closeRatingModal() {
      document.getElementById('ratingModal').style.display = 'none';
      editingImageId = null;
    }

    // 保存评价
    async function saveRating() {
      const score = parseInt(document.getElementById('modalScore').value);
      const comment = document.getElementById('modalComment').value.trim();
      const tagsInput = document.getElementById('modalTags').value.trim();
      const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()) : [];

      if (!score || score < 1 || score > 10) {
        showMessage('请输入 1-10 的评分', 'error');
        return;
      }

      try {
        // 保存评分
        await fetch(`${API_BASE}/image/${editingImageId}/rating`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ score, comment })
        });

        // 保存标签
        if (tags.length > 0) {
          await fetch(`${API_BASE}/image/${editingImageId}/tags`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tags })
          });
        }

        showMessage('保存成功', 'success');
        closeRatingModal();
        loadImages();
        loadStats();
        loadTags();
      } catch (e) {
        showMessage('保存失败', 'error');
      }
    }

    // 移除标签
    async function removeTag(imageId, tagName) {
      try {
        await fetch(`${API_BASE}/image/${imageId}/tags`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tags: [tagName] })
        });
        showMessage('标签已删除', 'success');
        loadImages();
      } catch (e) {
        showMessage('操作失败', 'error');
      }
    }

    // 加载标签
    async function loadTags() {
      try {
        const res = await fetch(`${API_BASE}/tags`);
        const data = await res.json();
        if (data.success) {
          allTags = data.tags;
        }
      } catch (e) {
        console.error('Failed to load tags:', e);
      }
    }

    // 查看图片
    function viewImage(imagePath) {
      window.open(`/image-viewer.html?src=${encodeURIComponent(imagePath)}`, '_blank');
    }

    // 复制路径
    function copyPath(imagePath) {
      navigator.clipboard.writeText(imagePath).then(() => {
        showMessage('路径已复制', 'success');
      });
    }

    // 刷新数据
    function refreshData() {
      loadStats();
      loadImages();
      loadTags();
    }

    // 显示消息
    function showMessage(text, type) {
      const existing = document.querySelector('.message');
      if (existing) existing.remove();

      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      document.body.appendChild(msg);

      setTimeout(() => msg.remove(), 3000);
    }

    // 切换视图模式
    function toggleViewMode() {
      // 简单实现：刷新页面
      location.reload();
    }
  </script>
</body>
</html>
